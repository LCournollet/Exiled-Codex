appId: com.exilecodex.app
productName: Exile Codex
copyright: Copyright © 2026 Exile Codex
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierrc,.prettierignore,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{README.md,docs}'
asarUnpack:
  - resources/**
win:
  executableName: exile-codex
  # electron-builder auto-generates the .ico from this PNG (must be >= 256x256).
  # For full control, drop a build/icon.ico (256x256) and point this at it.
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${productName}-${version}-portable.${ext}
extraResources:
  - from: resources
    to: resources
